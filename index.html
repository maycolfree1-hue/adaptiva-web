<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom | Marketing Agency</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030712;
            color: white;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('fondo.png.png'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            z-index: 10;
            background: rgba(3, 7, 18, 0.6);
            backdrop-filter: blur(10px);
        }

        .logo-img {
            height: 50px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #40CFFF;
        }

        .btn-top-whatsapp {
            background: #0081c9;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10%;
            max-width: 950px;
        }

        .tagline {
            color: #40CFFF;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tagline::before {
            content: "";
            width: 40px;
            height: 2px;
            background: #40CFFF;
        }

        h1 {
            font-size: clamp(50px, 8vw, 100px);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 15px;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        h2 {
            font-size: clamp(24px, 4vw, 48px);
            font-weight: 700;
            margin-bottom: 30px;
        }

        .description {
            font-size: 18px;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 45px;
            max-width: 550px;
        }

        /* Estilos del Botón con efectos */
        .cta-button {
            background: #0081c9;
            color: white;
            width: fit-content;
            padding: 20px 40px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 18px;
            transition: transform 0.2s ease-out, box-shadow 0.3s;
            position: relative;
            overflow: hidden; /* Importante para el efecto de brillo */
        }

        .cta-button:hover {
            box-shadow: 0 10px 30px rgba(0, 129, 201, 0.5);
            background: #00a0f0;
        }

        /* Efecto de brillo pasando por el botón */
        .cta-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .whatsapp-icon-circle {
            background: rgba(255,255,255,0.2);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-down {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #4b5563;
            font-size: 11px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <nav>
            <div class="logo-container">
                <img src="AXIOM AGENCY.jpg" alt="Axiom Logo" class="logo-img">
            </div>
            <div class="nav-links">
                <a href="#" class="active">Inicio</a>
                <a href="#">Servicios</a>
                <a href="#">Portafolio</a>
                <a href="#">Nosotros</a>
                <a href="#">Testimonios</a>
                <a href="#">Contacto</a>
            </div>
            <a href="#" class="btn-top-whatsapp">WhatsApp</a>
        </nav>

        <div class="main-content">
            <div class="tagline">AGENCIA DE</div>
            <h1>IMPÚLSATE</h1>
            <h2>Marketing en Lima</h2>
            <p class="description">
                Solicita tu propuesta hoy mismo y empieza a maximizar tu ROI con una agencia de marketing en Lima.
            </p>
            
            <a href="#" class="cta-button" id="btn-magnet">
                <div class="whatsapp-icon-circle">
                    <i class="fab fa-whatsapp"></i>
                </div>
                CONTACTAR AHORA ↗
            </a>
        </div>

        <div class="scroll-down">
            SCROLL <br>
            <i class="fas fa-chevron-down"></i>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn-magnet');

        btn.addEventListener('mousemove', (e) => {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            // El botón se mueve un 20% hacia la posición del mouse
            btn.style.transform = `translate(${x * 0.2}px, ${y * 0.4}px)`;
        });

        btn.addEventListener('mouseleave', () => {
            btn.style.transform = `translate(0px, 0px)`;
        });
    </script>

</body>
</html>
